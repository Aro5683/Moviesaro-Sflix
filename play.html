<!doctype html>


  

  
  
  
  <style>
    /* Reset margins and eliminate scrollbars for a true edge-to-edge full-screen layout */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000000; /* Pure black background matching standard players */
      overflow: hidden;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
    }

    /* Container fills up the absolute width and height of the view screen */
    .player-container {
      width: 100%;
      height: 100%;
      position: relative;
      background-color: #000000;
    }

    /* Embedded video frame settings */
    .player-container iframe {
      width: 100% !important;
      height: 100% !important;
      border: none !important;
      outline: none !important;
      display: block;
    }

    /* Fallback layout interface shown if the unique id parameter is absent */
    .error-wrapper {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
      color: #9ca3af;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .error-title {
      color: #ef4444;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    
    .error-text {
      font-size: 1rem;
      max-width: 400px;
    }
  </style>



  <div class="player-container" id="playerWrapper">
    </div>

  <script>
    (function() {
      // 1. PROACTIVE POPUP DEFUSE
      // Instantly nullify window.open execution at the parent environment scope.
      // If a hidden click tracker tries to breakout into a new tab via window.open, it safely hits this dummy function and fails.
      window.open = function() { 
        console.warn("Blocked an intentional window.open popup attempt.");
        return null; 
      };

      // Neutralize typical prompt confirmation spam techniques used by ad scripts
      window.alert = function() { return true; };
      window.confirm = function() { return true; };

      const wrapper = document.getElementById('playerWrapper');

      // 2. PARSE THE VIDEO UNIQUE IDENTIFIER
      // Grabs the parameter appended from your main site (e.g., ?id=the-little-mermaid-SvoSpr1Kd3)
      const urlParams = new URLSearchParams(window.location.search);
      const uniqueKey = urlParams.get('id');

      if (uniqueKey && uniqueKey.trim() !== "") {
        // Construct the targeted sflix streaming address string
        const targetStreamUrl = `https://sflix.film/spa/videoPlayPage/movies/${encodeURIComponent(uniqueKey.trim())}`;

        // 3. GENERATE PROTECTED IFRAME
        const iframe = document.createElement('iframe');
        iframe.setAttribute('src', targetStreamUrl);
        iframe.setAttribute('allowfullscreen', 'true');
        iframe.setAttribute('webkitallowfullscreen', 'true');
        iframe.setAttribute('mozallowfullscreen', 'true');
        
        /* * STRICTOR SANDBOX SETTINGS:
         * - allow-scripts: Permits internal streaming engine operations and layout setups.
         * - allow-same-origin: Allows cookie/storage handshakes strictly tied to sflix.film endpoints.
         * - allow-forms: Allows input controls (like search boxes or login menus within the stream page).
         * * CRITICAL: By purposely leaving out 'allow-popups', 'allow-popups-to-escape-sandbox', 
         * and 'allow-top-navigation', any background image clicks, overlays, or redirect links 
         * attempting to spawn secondary tabs are strictly blocked by the browser engine.
         */
        iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms');

        // Mount frame element onto interface
        wrapper.appendChild(iframe);

        // 4. AUTOMATIC ADDRESS BAR CLEANUP (HISTORY API)
        // Replaces current browser address track right after launching frame assets.
        // Drops "?id=..." parameter string seamlessly without causing a page refresh.
        try {
          const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
          window.history.replaceState({ path: cleanUrl }, '', cleanUrl);
        } catch (historyErr) {
          console.error("Address manipulation error context:", historyErr);
        }

      } else {
        // Fallback interface placeholder 
        wrapper.innerHTML = `
          <div class="error-wrapper">
            <div class="error-title">Invalid Playback Request</div>
            <div class="error-text">No active video identifier key detected. Please return to the main catalog and select a movie title to watch.</div>
          </div>
        `;
      }
    })();
  </script>


</!doctype>
