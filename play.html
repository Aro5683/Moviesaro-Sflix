<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Stream Player</title>
  
  <!-- Content Security Policy configured to protect media streams -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://sflix.film https://*.aoneroom.com https://pacdn.aoneroom.com; img-src 'self' data: https://*.aoneroom.com https://pacdn.aoneroom.com; child-src https://sflix.film;">
  
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000000;
      overflow: hidden;
      font-family: ui-sans-serif, system-ui, sans-serif;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* Relative wrapper acting as the bounding canvas anchor */
    .player-container {
      width: 100%;
      height: 100%;
      position: relative;
      background-color: #000000;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.3s ease;
    }

    .player-container iframe {
      width: 100% !important;
      height: 100% !important;
      border: none !important;
      outline: none !important;
      display: block;
      z-index: 1; /* Sits underneath the control layer button system */
      transition: all 0.3s ease;
    }

    /* 
      FLOATING ORIENTATION OVERLAY PANEL 
      Positioned absolutely inside the parent container to sit perfectly on top of the iframe player.
    */
    .floating-orientation-menu {
      position: absolute;
      top: 15px;      /* Positioned at the top area so it doesn't block standard player timelines at the bottom */
      right: 15px;
      display: flex;
      flex-direction: row; /* Arranged side-by-side to look like a control bar */
      gap: 8px;
      z-index: 9999999;    /* Forces it to render on top of the running iframe video component */
      pointer-events: none; /* Allows transparent accidental click bypass outside the actual buttons */
    }

    .floating-btn {
      background-color: rgba(20, 20, 20, 0.85);
      color: #ffffff;
      border: 1px solid #374151;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      transition: all 0.2s ease;
      pointer-events: auto; /* Forces the button components to remain clickable */
    }

    .floating-btn:active {
      transform: scale(0.95);
      background-color: #2563eb;
    }

    .floating-btn.active-mode {
      background-color: #16a34a; /* Distinctive green layout indicator matching current state choice */
      border-color: #16a34a;
    }

    /* Fallback landscape CSS transform mode configuration */
    .forced-landscape iframe {
      width: 100vh !important;
      height: 100vw !important;
      transform: rotate(90deg);
      transform-origin: center;
    }

    /* Shifts buttons position if forced rotation mode handles coordinate tracks */
    .forced-landscape .floating-orientation-menu {
      top: 15px;
      right: auto;
      left: 15px;
    }

    .error-wrapper {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
      color: #9ca3af;
      text-align: center;
      padding: 30px;
      box-sizing: border-box;
      z-index: 2;
    }

    .error-title {
      color: #ef4444;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    
    .error-text {
      font-size: 0.95rem;
      max-width: 320px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="player-container" id="playerWrapper">
    
    <!-- Floating Configuration Options Menu Container (Now nested inside the player wrapper) -->
    <div class="floating-orientation-menu" id="orientationMenu" style="display: none;">
      <button class="floating-btn active-mode" id="btnPortrait">
        📱 Portrait
      </button>
      <button class="floating-btn" id="btnLandscape">
        🔄 Landscape
      </button>
    </div>

  </div>

  <script>
    (function() {
      const wrapper = document.getElementById('playerWrapper');
      const menu = document.getElementById('orientationMenu');
      const btnPortrait = document.getElementById('btnPortrait');
      const btnLandscape = document.getElementById('btnLandscape');

      // 1. BLOCK DESKTOP PC & LAPTOP ACCESS TERMINAL TRACKS
      function isMobileDevice() {
        const userAgent = navigator.userAgent || navigator.vendor || window.opera;
        const mobileRegex = /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini/i;
        const isIpadTouch = (navigator.maxTouchPoints && navigator.maxTouchPoints > 2 && /Macintosh/.test(userAgent));
        return mobileRegex.test(userAgent) || isIpadTouch;
      }

      if (!isMobileDevice()) {
        wrapper.innerHTML = `
          <div class="error-wrapper">
            <div class="error-title">Device Not Supported</div>
            <div class="error-text">This streaming link is strictly reserved for mobile and tablet views. Please open this link using a smartphone device.</div>
          </div>
        `;
        return; 
      }

      // Render overlay navigation panel options on valid touch device verification
      menu.style.display = 'flex';

      // 2. INTERACTION EVENT TRACKING HANDLERS
      btnPortrait.addEventListener('click', function(e) {
        e.stopPropagation();
        wrapper.classList.remove('forced-landscape');
        btnPortrait.classList.add('active-mode');
        btnLandscape.classList.remove('active-mode');
      });

      btnLandscape.addEventListener('click', function(e) {
        e.stopPropagation();
        wrapper.classList.add('forced-landscape');
        btnLandscape.classList.add('active-mode');
        btnPortrait.classList.remove('active-mode');
      });

      // 3. SECURITY SCRIPT INJECTIONS
      document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
      document.addEventListener('keydown', function(e) {
        if (e.keyCode === 123) { e.preventDefault(); return false; }
        if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) { e.preventDefault(); return false; }
        if (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 83)) { e.preventDefault(); return false; }
      });

      window.open = function() { return null; };

      // 4. PARSE STREAM SOURCE DATA & MOUNT SECURED FRAME LAYER
      const urlParams = new URLSearchParams(window.location.search);
      const uniqueKey = urlParams.get('id');

      if (uniqueKey && uniqueKey.trim() !== "") {
        const targetStreamUrl = `https://sflix.film/spa/videoPlayPage/movies/${encodeURIComponent(uniqueKey.trim())}`;

        const iframe = document.createElement('iframe');
        iframe.setAttribute('src', targetStreamUrl);
        
        iframe.setAttribute('allowfullscreen', 'true');
        iframe.setAttribute('webkitallowfullscreen', 'true');
        iframe.setAttribute('mozallowfullscreen', 'true');
        
        iframe.setAttribute('allow', 'fullscreen; autoplay; screen-wake-lock;');
        iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-modals allow-presentation');

        wrapper.appendChild(iframe);

        // History track parameter sweep cleanup execution
        try {
          const cleanUrl = window.location.protocol + "//" + window.location.host + "/play";
          window.history.replaceState({ path: cleanUrl }, '', cleanUrl);
        } catch (historyErr) {}

      } else {
        menu.style.display = 'none';
        wrapper.innerHTML = `
          <div class="error-wrapper">
            <div class="error-title">Invalid Request</div>
            <div class="error-text">No active video identifier key detected. Return to the homepage to watch.</div>
          </div>
        `;
      }
    })();
  </script>

</body>
</html>
