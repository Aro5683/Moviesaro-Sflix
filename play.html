<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Stream Player</title>
  
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://sflix.film https://*.aoneroom.com https://pacdn.aoneroom.com; img-src 'self' data: https://*.aoneroom.com https://pacdn.aoneroom.com; child-src https://sflix.film;">
  
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000000;
      overflow: hidden;
      font-family: ui-sans-serif, system-ui, sans-serif;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .player-container {
      width: 100%;
      height: 100%;
      position: relative;
      background-color: #000000;
      overflow: hidden;
    }

    .player-container iframe {
      width: 100% !important;
      height: calc(100% - 150px) !important;
      border: none !important;
      outline: none !important;
      display: block;
      overflow: hidden !important;
      position: relative;
      z-index: 1;
    }

    .bottom-shield-block {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 150px;
      background-color: #000000;
      z-index: 9999998;
      pointer-events: auto;
    }

    .orientation-popup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgba(0, 0, 0, 0.85); 
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease-in-out;
    }

    .orientation-popup-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .orientation-popup-card {
      background-color: #1a1a1a;
      border: 1px solid #374151;
      padding: 24px;
      border-radius: 12px;
      width: 85%;
      max-width: 360px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
      text-align: center;
      color: #ffffff;
      transform: scale(0.9);
      transition: transform 0.3s ease;
    }

    .orientation-popup-overlay.show .orientation-popup-card {
      transform: scale(1);
    }

    .lang-switcher {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 1px solid #262626;
      padding-bottom: 12px;
    }

    .lang-btn {
      background-color: #262626;
      color: #a3a3a3;
      border: 1px solid #404040;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }

    .lang-btn.active-lang {
      background-color: #2563eb;
      color: #ffffff;
      border-color: #2563eb;
    }

    .instruction-text {
      margin: 0 0 12px 0;
      font-size: 0.95rem;
      font-weight: 500;
      line-height: 1.5;
      color: #e5e7eb;
      text-align: left;
    }

    .instruction-text span {
      display: block;
      margin-bottom: 10px;
    }

    .timer-badge {
      display: inline-block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #9ca3af;
      background-color: #262626;
      border: 1px solid #404040;
      padding: 6px 16px;
      border-radius: 50px;
      margin-top: 10px;
    }

    .timer-number {
      color: #22c55e;
      font-weight: 700;
    }

    .error-wrapper {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
      color: #9ca3af;
      text-align: center;
      padding: 30px;
      box-sizing: border-box;
      z-index: 2;
    }

    .error-title {
      color: #ef4444;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    
    .error-text {
      font-size: 0.95rem;
      max-width: 320px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="orientation-popup-overlay" id="orientationPopup">
    <div class="orientation-popup-card">
      <div class="lang-switcher">
        <button class="lang-btn active-lang" id="langEnBtn">English</button>
        <button class="lang-btn" id="langTaBtn">தமிழ்</button>
      </div>

      <div class="instruction-text" id="instructionContent">
        <span>📱 Disable Auto orientation to make full screen video.</span>
        <span>▶️ Once the video loads, click full screen and rotate your mobile, otherwise the video won't be visible.</span>
      </div>

      <div class="timer-badge">
        <span id="timerText">Closing automatically in</span> <span id="countdownSeconds" class="timer-number">5</span>s...
      </div>
    </div>
  </div>

  <div class="player-container" id="playerWrapper">
    <div class="bottom-shield-block" id="bottomShield"></div>
  </div>

  <script>
    (function() {
      // 1. SILENT POPUP TERMINATOR
      window.open = function() { return null; };
      
      window.onbeforeunload = function() {
        return "Preventing ad redirect.";
      };

      // 2. FOCUS BLINK HIGHER SECURITY LAYER
      // Detects if an ad is shifting window focus away from the main document to generate popups.
      window.addEventListener('blur', function() {
        setTimeout(function() {
          if (document.activeElement === document.querySelector('iframe')) {
            // Clicks landing inside iframe are fine; let browser continue natively.
          } else {
            // An rogue ad tried to pull focus to a newly opened tab window background process. Force shift back!
            window.focus();
          }
        }, 0);
      });

      const wrapper = document.getElementById('playerWrapper');
      const bottomShield = document.getElementById('bottomShield');
      const popup = document.getElementById('orientationPopup');
      const timerNumber = document.getElementById('countdownSeconds');
      const timerText = document.getElementById('timerText');
      
      const langEnBtn = document.getElementById('langEnBtn');
      const langTaBtn = document.getElementById('langTaBtn');
      const instructionContent = document.getElementById('instructionContent');

      const translations = {
        en: {
          text: `<span>📱 Disable Auto orientation to make full screen video.</span>
                 <span>▶️ Once the video loads, click full screen and rotate your mobile, otherwise the video won't be visible.</span>`,
          timer: "Closing automatically in"
        },
        ta: {
          text: `<span>📱 முழுத் திரையில் (Full Screen) வீடியோவை பார்க்க, மொபைலில் 'Auto-Rotate' ஆப்ஷனை ஆஃப் (Disable) செய்யவும்.</span>
                 <span>▶️ வீடியோ முழுமையாக லோடு ஆனதும், 'Full Screen' பட்டனை கிளிக் செய்துவிட்டு மொபைலை திருப்பவும். இல்லையெனில் வீடியோ தெரியாது.</span>`,
          timer: "தானாக மூடும் நேரம்"
        }
      };

      function isMobileDevice() {
        const userAgent = navigator.userAgent || navigator.vendor || window.opera;
        const mobileRegex = /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini/i;
        const isIpadTouch = (navigator.maxTouchPoints && navigator.maxTouchPoints > 2 && /Macintosh/.test(userAgent));
        return mobileRegex.test(userAgent) || isIpadTouch;
      }

      if (!isMobileDevice()) {
        bottomShield.style.display = 'none';
        popup.style.display = 'none'; 
        wrapper.innerHTML = `
          <div class="error-wrapper">
            <div class="error-title">Device Not Supported</div>
            <div class="error-text">This streaming link is strictly reserved for mobile and tablet views. Please open this link using a smartphone device.</div>
          </div>
        `;
        return; 
      }

      // Language Switch Controls
      langEnBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        langEnBtn.classList.add('active-lang');
        langTaBtn.classList.remove('active-lang');
        instructionContent.innerHTML = translations.en.text;
        timerText.textContent = translations.en.timer;
      });

      langTaBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        langTaBtn.classList.add('active-lang');
        langEnBtn.classList.remove('active-lang');
        instructionContent.innerHTML = translations.ta.text;
        timerText.textContent = translations.ta.timer;
      });

      // 5-Second Timer
      let timeLeft = 5; 
      setTimeout(function() {
        popup.classList.add('show');
        const countdownInterval = setInterval(function() {
          timeLeft--;
          timerNumber.textContent = timeLeft;
          if (timeLeft <= 0) {
            clearInterval(countdownInterval); 
            popup.classList.remove('show');   
          }
        }, 1000);
      }, 300);

      document.addEventListener('contextmenu', function(e) { e.preventDefault(); });

      // Parse and construct iframe element
      const urlParams = new URLSearchParams(window.location.search);
      const uniqueKey = urlParams.get('id');

      if (uniqueKey && uniqueKey.trim() !== "") {
        const targetStreamUrl = `https://netfilm.world/spa/videoPlayPage/movies/${encodeURIComponent(uniqueKey.trim())}`;

        const iframe = document.createElement('iframe');
        iframe.setAttribute('src', targetStreamUrl);
        iframe.setAttribute('scrolling', 'no');
        iframe.setAttribute('allowfullscreen', 'true');
        iframe.setAttribute('webkitallowfullscreen', 'true');
        iframe.setAttribute('mozallowfullscreen', 'true');
        iframe.setAttribute('allow', 'fullscreen; autoplay; screen-wake-lock;');
        
        // BALANCED SECURE SANDBOX STRING:
        // 'allow-same-origin' and 'allow-scripts' ensure player controls work perfectly.
        // Leaving out 'allow-popups' blocks new windows completely from firing during clicks.
        iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-presentation');

        wrapper.insertBefore(iframe, bottomShield);

        try {
          const cleanUrl = window.location.protocol + "//" + window.location.host + "/play";
          window.history.replaceState({ path: cleanUrl }, '', cleanUrl);
        } catch (historyErr) {}

      } else {
        bottomShield.style.display = 'none';
        popup.style.display = 'none';
        wrapper.innerHTML = `
          <div class="error-wrapper">
            <div class="error-title">Invalid Request</div>
            <div class="error-text">No active video identifier key detected. Return to the homepage to watch.</div>
          </div>
        `;
      }
    })();
  </script>

</body>
</html>
