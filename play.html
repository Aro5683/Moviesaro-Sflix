<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Stream Player</title>
  
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://sflix.film https://*.aoneroom.com https://pacdn.aoneroom.com; img-src 'self' data: https://*.aoneroom.com https://pacdn.aoneroom.com; child-src https://sflix.film;">
  
  <style>
    /* Absolute full-screen bounds optimized for both portrait & landscape mobile displays */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000000;
      overflow: hidden;
      font-family: ui-sans-serif, system-ui, sans-serif;
      /* Disable user selections and highlight highlights on mobile tap */
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .player-container {
      width: 100%;
      height: 100%;
      position: relative;
      background-color: #000000;
    }

    .player-container iframe {
      width: 100% !important;
      height: 100% !important;
      border: none !important;
      outline: none !important;
      display: block;
    }

    /* Error wrapper styling used for blocked PC views or invalid playback tracking links */
    .error-wrapper {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
      color: #9ca3af;
      text-align: center;
      padding: 30px;
      box-sizing: border-box;
    }

    .error-title {
      color: #ef4444;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    
    .error-text {
      font-size: 0.95rem;
      max-width: 320px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="player-container" id="playerWrapper"></div>

  <script>
    (function() {
      const wrapper = document.getElementById('playerWrapper');

      // ==========================================
      // 1. BLOCK RECEPTIVITY ON PC & LAPTOP DEVICES
      // ==========================================
      function isMobileDevice() {
        const userAgent = navigator.userAgent || navigator.vendor || window.opera;
        // Strict RegExp checklist matching common mobile operating system tags
        const mobileRegex = /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini/i;
        
        // Also check modern iPads running desktop safari matching touch capabilities
        const isIpadTouch = (navigator.maxTouchPoints && navigator.maxTouchPoints > 2 && /Macintosh/.test(userAgent));
        
        return mobileRegex.test(userAgent) || isIpadTouch;
      }

      if (!isMobileDevice()) {
        // Halt everything immediately and render explicit device block notice
        wrapper.innerHTML = `
          <div class="error-wrapper">
            <div class="error-title">Device Not Supported</div>
            <div class="error-text">This streaming link is strictly reserved for mobile and tablet views. Please open this link using a smartphone device.</div>
          </div>
        `;
        return; // Abort execution loop
      }

      // ==========================================
      // 2. DISABLE DEVELOPER INTERACTION COMMANDS
      // ==========================================
      // Disable Context Mouse Right-Clicks
      document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
      });

      // Intercept and counter standard key sequences targeting source inspect modes
      document.addEventListener('keydown', function(e) {
        // Block F12 Key
        if (e.keyCode === 123) {
          e.preventDefault();
          return false;
        }
        // Block Ctrl+Shift+I (Inspect), Ctrl+Shift+J (Console), Ctrl+Shift+C (Elements Selector)
        if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) {
          e.preventDefault();
          return false;
        }
        // Block Ctrl+U (View Source Code)
        if (e.ctrlKey && e.keyCode === 85) {
          e.preventDefault();
          return false;
        }
        // Block Ctrl+S (Save Page Command)
        if (e.ctrlKey && e.keyCode === 83) {
          e.preventDefault();
          return false;
        }
      });

      // Proactive Popup Defusal
      window.open = function() { return null; };
      window.alert = function() { return true; };
      window.confirm = function() { return true; };

      // ==========================================
      // 3. EXECUTE MOUNT PARSE & CLEAN TRACKS
      // ==========================================
      const urlParams = new URLSearchParams(window.location.search);
      const uniqueKey = urlParams.get('id');

      if (uniqueKey && uniqueKey.trim() !== "") {
        const targetStreamUrl = `https://sflix.film/spa/videoPlayPage/movies/${encodeURIComponent(uniqueKey.trim())}`;

        // Generate the sandboxed player frame 
        const iframe = document.createElement('iframe');
        iframe.setAttribute('src', targetStreamUrl);
        iframe.setAttribute('allowfullscreen', 'true');
        iframe.setAttribute('webkitallowfullscreen', 'true');
        iframe.setAttribute('mozallowfullscreen', 'true');
        
        // Anti-popup mobile sandboxing values configuration
        iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms');

        wrapper.appendChild(iframe);

        // Address Bar Track Parameter Removal logic
        try {
          const cleanUrl = window.location.protocol + "//" + window.location.host + "/play";
          window.history.replaceState({ path: cleanUrl }, '', cleanUrl);
        } catch (historyErr) {}

      } else {
        wrapper.innerHTML = `
          <div class="error-wrapper">
            <div class="error-title">Invalid Request</div>
            <div class="error-text">No active video identifier key detected. Return to the homepage to watch.</div>
          </div>
        `;
      }
    })();
  </script>

</body>
</html>
