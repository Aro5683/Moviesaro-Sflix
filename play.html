<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Stream Player</title>
  
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://sflix.film https://*.aoneroom.com https://pacdn.aoneroom.com; img-src 'self' data: https://*.aoneroom.com https://pacdn.aoneroom.com; child-src https://sflix.film;">
  
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000000;
      overflow: hidden; /* Strict scroll disable on body element */
      font-family: ui-sans-serif, system-ui, sans-serif;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* Relative wrapper acting as the absolute non-scrollable stage canvas */
    .player-container {
      width: 100%;
      height: 100%;
      position: relative;
      background-color: #000000;
      overflow: hidden; /* Strict scroll disable inside the layout canvas wrapper */
    }

    .player-container iframe {
      width: 100% !important;
      height: calc(100% - 150px) !important; /* Limits player view bounds directly above the bottom block */
      border: none !important;
      outline: none !important;
      display: block;
      overflow: hidden !important; /* Extra scroll guard modifier for browser engines */
    }

    /* SOLID BLACK BOTTOM MASK */
    .bottom-shield-block {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 150px;
      background-color: #000000; /* Matching absolute pure black */
      z-index: 9999998;           /* Enforces placement directly above the iframe stream track */
      pointer-events: auto;       /* Absorbs rogue ad clicks landing near the bottom screen track */
    }

    /* MOBILE ORIENTATION ALERT MODAL WITH AUTOMATIC TIMEOUT CLOCK */
    .orientation-popup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgba(0, 0, 0, 0.85); /* Slightly darker backdrop for better readability */
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999999; /* Forces popup visibility strictly above everything else */
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease-in-out;
    }

    .orientation-popup-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .orientation-popup-card {
      background-color: #1a1a1a;
      border: 1px solid #374151;
      padding: 28px 24px;
      border-radius: 12px;
      width: 85%;
      max-width: 340px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
      text-align: center;
      color: #ffffff;
      transform: scale(0.9);
      transition: transform 0.3s ease;
    }

    .orientation-popup-overlay.show .orientation-popup-card {
      transform: scale(1);
    }

    .orientation-popup-card p {
      margin: 0 0 15px 0;
      font-size: 1.05rem;
      font-weight: 500;
      line-height: 1.5;
      color: #e5e7eb;
    }

    /* Dynamic Visual Text Countdown Timer Area */
    .timer-badge {
      display: inline-block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #9ca3af;
      background-color: #262626;
      border: 1px solid #404040;
      padding: 6px 16px;
      border-radius: 50px;
      margin-top: 5px;
    }

    .timer-number {
      color: #22c55e; /* Green numeric countdown highlight */
      font-weight: 700;
    }

    /* Error wrapper layouts */
    .error-wrapper {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
      color: #9ca3af;
      text-align: center;
      padding: 30px;
      box-sizing: border-box;
      z-index: 2;
    }

    .error-title {
      color: #ef4444;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    
    .error-text {
      font-size: 0.95rem;
      max-width: 320px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="orientation-popup-overlay" id="orientationPopup">
    <div class="orientation-popup-card">
      <p>⚠️ Disable Auto orientation to make full screen video</p>
      <div class="timer-badge">
        Closing automatically in <span id="countdownSeconds" class="timer-number">5</span>s...
      </div>
    </div>
  </div>

  <div class="player-container" id="playerWrapper">
    
    <div class="bottom-shield-block" id="bottomShield"></div>

  </div>

  <script>
    (function() {
      const wrapper = document.getElementById('playerWrapper');
      const bottomShield = document.getElementById('bottomShield');
      const popup = document.getElementById('orientationPopup');
      const timerNumber = document.getElementById('countdownSeconds');

      // 1. BLOCK DESKTOP PC & LAPTOP DEVICE ACCESS
      function isMobileDevice() {
        const userAgent = navigator.userAgent || navigator.vendor || window.opera;
        const mobileRegex = /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini/i;
        const isIpadTouch = (navigator.maxTouchPoints && navigator.maxTouchPoints > 2 && /Macintosh/.test(userAgent));
        return mobileRegex.test(userAgent) || isIpadTouch;
      }

      if (!isMobileDevice()) {
        bottomShield.style.display = 'none';
        popup.style.display = 'none'; 
        wrapper.innerHTML = `
          <div class="error-wrapper">
            <div class="error-title">Device Not Supported</div>
            <div class="error-text">This streaming link is strictly reserved for mobile and tablet views. Please open this link using a smartphone device.</div>
          </div>
        `;
        return; 
      }

      // 2. TIMED AUTOMATIC POPUP MANAGER
      let timeLeft = 5; // Duration in seconds

      // Reveal the popup cleanly upon mobile confirmation
      setTimeout(function() {
        popup.classList.add('show');
        
        // Begin processing active count down tracking loop ticks every 1000ms
        const countdownInterval = setInterval(function() {
          timeLeft--;
          timerNumber.textContent = timeLeft;

          if (timeLeft <= 0) {
            clearInterval(countdownInterval); // Kill ticker routine 
            popup.classList.remove('show');   // Remove the overlay from screen view
          }
        }, 1000);

      }, 300);

      // 3. SECURITY INTERCEPT COMMANDS (RIGHT CLICK + INSPECT DEFUSE)
      document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
      document.addEventListener('keydown', function(e) {
        if (e.keyCode === 123) { e.preventDefault(); return false; }
        if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) { e.preventDefault(); return false; }
        if (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 83)) { e.preventDefault(); return false; }
      });

      window.open = function() { return null; };

      // 4. PARSE TRACK UNIQUE IDENTIFIER & INJECT LOCKED IFRAME
      const urlParams = new URLSearchParams(window.location.search);
      const uniqueKey = urlParams.get('id');

      if (uniqueKey && uniqueKey.trim() !== "") {
        const targetStreamUrl = `https://sflix.film/spa/videoPlayPage/movies/${encodeURIComponent(uniqueKey.trim())}`;

        const iframe = document.createElement('iframe');
        iframe.setAttribute('src', targetStreamUrl);
        
        // Disable scroll support explicitly at the legacy iframe element definition parameter track
        iframe.setAttribute('scrolling', 'no');
        
        iframe.setAttribute('allowfullscreen', 'true');
        iframe.setAttribute('webkitallowfullscreen', 'true');
        iframe.setAttribute('mozallowfullscreen', 'true');
        
        iframe.setAttribute('allow', 'fullscreen; autoplay; screen-wake-lock;');
        iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-modals allow-presentation');

        // Insert the secure iframe element underneath the absolute bottom shield node
        wrapper.insertBefore(iframe, bottomShield);

        // Instantly sanitize the address URL query tracking strings
        try {
          const cleanUrl = window.location.protocol + "//" + window.location.host + "/play";
          window.history.replaceState({ path: cleanUrl }, '', cleanUrl);
        } catch (historyErr) {}

      } else {
        bottomShield.style.display = 'none';
        popup.style.display = 'none';
        wrapper.innerHTML = `
          <div class="error-wrapper">
            <div class="error-title">Invalid Request</div>
            <div class="error-text">No active video identifier key detected. Return to the homepage to watch.</div>
          </div>
        `;
      }
    })();
  </script>

</body>
</html>
