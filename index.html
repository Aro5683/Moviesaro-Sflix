<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Safe Viewer</title>
    <style>
        /* Reset and Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f0f0;
        }

        /* Desktop Block Screen (Default) */
        #desktop-block {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            z-index: 9999;
            position: fixed;
            top: 0;
            left: 0;
        }

        #desktop-block h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        /* Mobile Container (Hidden by default on PC) */
        #mobile-container {
            display: none;
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Device Detection Strategy: 
           Target screens typically associated with mobile/tablets (up to 1024px) 
           AND require a pointer capability of 'coarse' (touchscreens).
        */
        @media screen and (max-width: 1024px) and (pointer: coarse) {
            #desktop-block {
                display: none;
            }
            #mobile-container {
                display: block;
            }
        }

        /* Full Screen Iframe Wrapper */
        .iframe-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Covers / Overlays */
        .cover {
            position: absolute;
            left: 0;
            width: 100%;
            background-color: #ffffff;
            z-index: 10;
            /* pointer-events: none; Optional: Allows users to click 'through' the cover if needed, or leave it to block clicks */
        }

        .top-cover {
            top: 0;
            height: 50px;
            border-bottom: 1px solid #e0e0e0; /* Optional: gives a visual boundary */
        }

        .bottom-cover {
            bottom: 0;
            height: 100px;
            border-top: 1px solid #e0e0e0; /* Optional: gives a visual boundary */
        }
    </style>
</head>
<body>

    <div id="desktop-block">
        <h1>Access Restricted</h1>
        <p>This website is only accessible on mobile devices (phones and tablets).</p>
    </div>

    <div id="mobile-container">
        
        <div class="cover top-cover"></div>

        <div class="iframe-wrapper">
            <iframe 
                src="https://codebeautify.org/source-code-viewer" 
                sandbox="allow-scripts allow-forms allow-same-origin">
            </iframe>
        </div>

        <div class="cover bottom-cover"></div>

    </div>

</body>
</html>
