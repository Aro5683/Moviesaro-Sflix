<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile View Only - Ad Blocked</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .iframe-container {
            width: 100%;
            height: 100%;
            display: none; 
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .desktop-block {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            color: #fff;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .desktop-block h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .desktop-block p {
            font-size: 16px;
            color: #888;
        }

        @media only screen and (max-width: 767px) {
            .iframe-container {
                display: block;
            }
            .desktop-block {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="desktop-block">
        <h1>Mobile Access Only</h1>
        <p>Please open this website on your mobile device.</p>
    </div>

    <div class="iframe-container">
        <!-- 
          Strict Sandbox Configuration:
          - Omit 'allow-popups': Kills window.open() and target="_blank" links (No new tabs/popups).
          - Omit 'allow-popups-to-escape-sandbox': Keeps everything locked in this box.
          - 'allow-scripts' + 'allow-same-origin': Necessary for the movie site to load assets, but now heavily guarded.
        -->
        <iframe 
            src="https://sflix.film/search-result?keyword=Search+Tamil+movies" 
            sandbox="allow-scripts allow-forms allow-same-origin"
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
