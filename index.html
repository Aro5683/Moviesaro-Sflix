<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile View Only - Anti-PopUp Shield</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .iframe-container {
            width: 100%;
            height: 100%;
            display: none; 
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            -webkit-overflow-scrolling: touch;
        }

        /* Anti-ad listener layer */
        .touch-interceptor {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 9999;
            pointer-events: auto;
        }

        .touch-interceptor.pass-through {
            pointer-events: none;
        }

        .desktop-block {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            color: #fff;
            text-align: center;
            padding: 20px;
        }

        @media only screen and (max-width: 767px) {
            .iframe-container { display: block; }
            .desktop-block { display: none; }
        }
    </style>
</head>
<body>

    <div class="desktop-block">
        <h1>Mobile Access Only</h1>
        <p>Please open this websiteee on your mobile device.</p>
    </div>

    <div class="iframe-container">
        <div class="touch-interceptor" id="interceptor"></div>
        
        <iframe 
            id="stream-frame"
            src="https://sflix.film/search-result?keyword=Search+Tamil+movies" 
            sandbox="allow-scripts allow-forms allow-same-origin"
            allowfullscreen>
        </iframe>
    </div>

    <script>
        const interceptor = document.getElementById('interceptor');
        const frame = document.getElementById('stream-frame');

        // Capture touchstart instantly to drop the hidden click overlay ads use
        interceptor.addEventListener('touchstart', (e) => {
            // 1. Defuse browser target window exploitation strings
            window.open = function() { return null; }; 
            
            // 2. Clear out interceptor temporarily so the native Nuxt UI handles your tap smoothly
            interceptor.classList.add('pass-through');

            // 3. Bring the defensive layer back before background redirect threads fire
            setTimeout(() => {
                interceptor.classList.remove('pass-through');
            }, 250); 
        }, { passive: true });
    </script>
</body>
</html>
