<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile View Only - Masked Frames</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* Full-fit container */
        .iframe-container {
            width: 100%;
            height: 100%;
            display: none; 
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            -webkit-overflow-scrolling: touch;
        }

        /* Anti-ad listener layer */
        .touch-interceptor {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 10;
            pointer-events: auto;
        }

        .touch-interceptor.pass-through {
            pointer-events: none;
        }

        /* --- THE COVERS --- */
        /* High z-index (20) ensures they stay firmly on top of the iframe and the touch interceptor */
        .top-cover {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background-color: black;
            z-index: 20;
            pointer-events: none; /* Allows clicks to pass through if necessary, or change to 'auto' to completely block clicks on the cover */
        }

        .bottom-cover {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 230px;
            background-color: black;
            z-index: 20;
            pointer-events: none;
        }
        /* ------------------ */

        .desktop-block {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            color: #fff;
            text-align: center;
            padding: 20px;
        }

        @media only screen and (max-width: 767px) {
            .iframe-container { display: block; }
            .desktop-block { display: none; }
        }
    </style>
</head>
<body>

    <div class="desktop-block">
        <h1>Mobile Access Only</h1>
        <p>Please open this website rron your mobhhile device.</p>
    </div>

    <div class="iframe-container">
        <div class="top-cover"></div>
        <div class="bottom-cover"></div>

        <div class="touch-interceptor" id="interceptor"></div>
        
        <iframe 
            id="stream-frame"
            src="https://sflix.film/search-result?keyword=Search+Tamil+movies" 
            sandbox="allow-scripts allow-forms allow-same-origin"
            allowfullscreen>
        </iframe>
    </div>

    <script>
        const interceptor = document.getElementById('interceptor');

        interceptor.addEventListener('touchstart', (e) => {
            window.open = function() { return null; }; 
            interceptor.classList.add('pass-through');

            setTimeout(() => {
                interceptor.classList.remove('pass-through');
            }, 250); 
        }, { passive: true });
    </script>
</body>
</html>
